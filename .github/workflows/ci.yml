test:
  runs-on: ubuntu-latest
  needs: lint
  steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install package and dev deps # replaces `pip install -r requirements.txt`
      run: pip install -e ".[dev]"
    - run: pytest --asyncio-mode=auto --cov=agentic_sentinel --cov-report=xml -v
    - uses: codecov/codecov-action@v4
