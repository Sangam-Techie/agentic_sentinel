# Triggers: every push to main or develop, every pull request targeting main

name: CI - Lint . Test . Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Limit GITHUB_TOKEN permissions to the minimum required.
# This reduces blast radius if a dependency is compromised.
permissions:
  contents: read     # checkout needs read
  checks:   write    # allows posting test results as check annotations

jobs:

  # ------------------------------------------------------------
  # JOB 1: Lint
  # Fast-fail gate. If the code doesn't parse cleanly, stop here.
  # ------------------------------------------------------------
  lint:
    name: Lint & Type-Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 pinned

      - name: Set up Python 3.12
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install lint tools only
        # Full Project not installed here deliberately.
        # Lint doesn't need the runtime dependencies.
        run: uv pip install ruff mypy

      - name: Run ruff (linter + formatter check)
        # --output-format=github formats errors as GitHub annotations
        # shown inline in the PR diff - much easier to read that raw output
        run: ruff check --output-format=github .

      - name: Run mypy (type checker)
        run: mypy agentic_sentinel/ --ignore-missing-imports --no-error-summary


  # ------------------------------------------------------------
  # JOB 2: Test
  # Only runs if lint passed. Uses editable install so imports
  # work identically to the developer's local environment.
  # ------------------------------------------------------------
  tests:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint # enforces lint -> test ordering

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install project with dev dependencies
        # -e installs in editable mode (same as local dev)
        # .[dev] includes pytest, pytest-asyncio, ruff, mypy, pre-commit
        run: uv pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: |
          pytest \
            --asyncio-mode=auto \
            --cov=agentic_sentinel \
            --cov-report=xml \
            --cov-report=term-missing \
            -v
        env:
          # Ensure the kill switch is oFF during tests.
          # Individual tests that need it ON use monkeypatch.setenv
          AGENT_KILL_SWITCH: "false"
          # Point tests at in-memory SQlite - no file system side effects in CI.
          DATABASE_URL: "sqlite://"

      - name: Upload covarage report
        # Only upload if tests actually ran (even if some failed)
        if: always()
        uses: codecov/codecov-action@1e68e06f1dbfde0e4cefc87efeba9e4643565303  # v5.1.2 pinned
        with:
          files: ./coverage.xml
          fail_ci_if_error: false # can't fail the build over a covarage upload issue


  # --------------------------------------------------
  # JOB 3: Build
  # Verifies both container images build cleanly
  # Not pushing to a registry yet - that's for later week(maybe around week 10)
  build:
    name: Container Build
    runs-on: ubuntu-latest
    needs: tests # enforces test -> build ordering

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install podman
        # Ubuntu runners don't have podman by default
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y podman

      - name: Build backend image
        run: |
          podman build \
            --tag agentic-sentinel-backend:ci \
            --file backend/Dockerfile \
            .

      - name: Build dashboard image
        run: |
          podman build \
            --tag agentic-sentinel-dashboard:ci \
            --dile dashboard/Dockerfile \
            .

      - name: Smoke-test backend image starts
        # Verify the image doesn't immediately crash on startup
        # --rm cleans up the container after it exits.
        # timeout 5 gives it 5 seconds to start then kills it - expected exit code non-zero,
        # but if podman itself errors (image broken) the exit is different
        run: |
          podman run --rm \
            --env AGENT_KILL_SWITCH=false \
            --env DATABASE_URL=sqlite:///tmp/ci_test.sqlite \
            agentic-sentinel-backend:ci \
            python -c "from agentic_sentinel.agents import AgentBase; print('import')"

      - name: Generate SBOM
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft agentic-sentinel-backend:ci -o cyclonedx-json > sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact
        with:
          name: sbom-report
          path: sbom.json

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'agentic-sentinel-backend:ci'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
