# Triggers: every push to main or develop, every pull request targeting main

name: CI - Lint . Test . Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Limit GITHUB_TOKEN permissions to the minimum required.
# This reduces blast radius if a dependency is compromised.
permissions:
  contents: read     # checkout needs read
  checks:   write    # allows posting test results as check annotations

env:
  # This force-upgrades all actions to the Node.js 24 runner immediately
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ------------------------------------------------------------
  # JOB 1: Lint
  # Fast-fail gate. If the code doesn't parse cleanly, stop here.
  # ------------------------------------------------------------
  lint:
    name: Lint & Type-Check
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true

      - name: Install lint tools only
        # Full Project not installed here deliberately.
        # Lint doesn't need the runtime dependencies.
        run: uv pip install --system ruff mypy

      - name: Run ruff (linter + formatter check)
        # --output-format=github formats errors as GitHub annotations
        # shown inline in the PR diff - much easier to read that raw output
        run: ruff check --output-format=github .

      - name: Run mypy (type checker)
        run: mypy agentic_sentinel/ --ignore-missing-imports --no-error-summary


  # ------------------------------------------------------------
  # JOB 2: Test
  # Only runs if lint passed. Uses editable install so imports
  # work identically to the developer's local environment.
  # ------------------------------------------------------------
  tests:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint # enforces lint -> test ordering

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true

      - name: Install project with dev dependencies
        # -e installs in editable mode (same as local dev)
        # .[dev] includes pytest, pytest-asyncio, ruff, mypy, pre-commit
        run: uv pip install --system -e ".[dev]"

      - name: Run pytest with coverage
        run: |
          pytest \
            --asyncio-mode=auto \
            --cov=agentic_sentinel \
            --cov-report=xml \
            --cov-report=term-missing \
            -v
        env:
          # Ensure the kill switch is oFF during tests.
          # Individual tests that need it ON use monkeypatch.setenv
          AGENT_KILL_SWITCH: "false"
          # Point tests at in-memory SQlite - no file system side effects in CI.
          DATABASE_URL: "sqlite://"

      - name: Upload covarage report
        # Only upload if tests actually ran (even if some failed)
        if: always()
        uses: codecov/codecov-action@1e68e06f1dbfde0e4cefc87efeba9e4643565303 # v5.1.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false # can't fail the build over a covarage upload issue


  # --------------------------------------------------
  # JOB 3: Build
  # Verifies both container images build cleanly
  # Not pushing to a registry yet - that's for later week(maybe around week 10)
  build:
    name: Container Build
    runs-on: ubuntu-latest
    needs: tests # enforces test -> build ordering

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            auth.docker.io:443
            pypi.org:443
            files.pythonhosted.org:443
            github.com:443
            raw.githubusercontent.com:443
            index.docker.io:443
            registry-1.docker.io:443
            production.cloudflare.docker.com:443
            objects.githubusercontent.com:443

      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install podman
        # Ubuntu runners don't have podman by default
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y podman

      - name: Build backend image
        run: |
          podman build \
            --tag agentic-sentinel-backend:ci \
            --file backend/Dockerfile \
            .

      - name: Run Trivy on Backend Image
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # 0.34.2
        with:
          image-ref: 'localhost/agentic-sentinel-backend:ci'
          format: 'table'
          exit-code: '1' # Fails the build if vulnerabilities are found
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Build dashboard image
        run: |
          podman build \
            --tag agentic-sentinel-dashboard:ci \
            --file dashboard/Dockerfile \
            .

      - name: Run Trivy on Dashboard Image
        uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # 0.34.2
        with:
          image-ref: 'localhost/agentic-sentinel-dashboard:ci'
          format: 'table'
          exit-code: '1' # Fails the build if vulnerabilities are found
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Smoke-test backend image starts
        # Verify the image doesn't immediately crash on startup
        # --rm cleans up the container after it exits.
        # timeout 5 gives it 5 seconds to start then kills it - expected exit code non-zero,
        # but if podman itself errors (image broken) the exit is different
        run: |
          podman run --rm \
            --env AGENT_KILL_SWITCH=false \
            --env DATABASE_URL=sqlite:///tmp/ci_test.sqlite \
            agentic-sentinel-backend:ci \
            python -c "from agentic_sentinel.agents import AgentBase; print('import')"

      - name: Generate SBOM
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft dir:backend -o cyclonedx-json > sbom.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: sbom-report
          path: sbom.json
